{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>发布新博客</h2>
    <form method="POST" action="/add" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">博客标题</label>
            <input type="text" id="title" name="title" required placeholder="请输入博客标题">
        </div>
        <div class="form-group">
            <label for="cover">博客封面图</label>
            <input type="file" id="cover" name="cover" accept="image/*">
            <small class="form-tip">支持 jpg、png、gif 格式，建议尺寸 800x400</small>
        </div>
        <div class="form-group">
            <label for="content">博客内容</label>
            <textarea id="content" name="content" rows="10" required placeholder="请输入博客内容"></textarea>
        </div>
        <div class="form-group">
            <label for="category_id">博客分类</label>
            <select id="category_id" name="category_id">
                <option value="0">无分类</option>
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="submit-btn">发布博客</button>
    </form>
</div>
{% endblock %}
