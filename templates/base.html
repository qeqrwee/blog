<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>我的博客</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="nav">
            <h1><a href="/">我的博客</a></h1>
            <div class="nav-links">
                {% if session.user %}
                    <a href="/add" class="nav-btn">发布博客</a>
                    <a href="/categories" class="nav-btn cate-manage">分类管理</a>
                    <a href="/logout" class="nav-btn logout">退出登录</a>
                {% else %}
                    <a href="/register" class="nav-btn register">注册</a>
                    <a href="/login" class="nav-btn login">登录</a>
                {% endif %}
            </div>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>© 2026 我的个人博客</p>
    </footer>
</body>
</html>
